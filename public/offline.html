<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>포켓미션 — 오프라인</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #fff7ed 0%, #ffedd5 50%, #fed7aa 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      text-align: center;
      max-width: 320px;
    }
    .emoji { font-size: 64px; margin-bottom: 20px; }
    h1 { font-size: 22px; color: #1f2937; margin-bottom: 8px; font-weight: 800; }
    p { font-size: 14px; color: #6b7280; line-height: 1.6; margin-bottom: 24px; }
    button {
      background: #f97316;
      color: white;
      border: none;
      padding: 14px 32px;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
    }
    button:active { background: #ea580c; }
  </style>
</head>
<body>
  <div class="container">
    <div class="emoji">📡</div>
    <h1>인터넷 연결이 필요해요</h1>
    <p>Wi-Fi나 데이터를 확인한 후<br>다시 시도해 주세요.</p>
    <button onclick="location.reload()">다시 시도</button>
  </div>
</body>
</html>
